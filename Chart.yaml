apiVersion: v2
name: common
description: Library Helm chart providing reusable templates for Kubernetes workloads, services, autoscaling, and observability.
type: library
version: "2.3.3"
kubeVersion: ">=1.24-0"
home: https://github.com/alexremn/helm-common-chart
sources:
  - https://github.com/alexremn/helm-common-chart
maintainers:
  - name: Alex Remniov
    url: https://remniov.com
keywords:
  - common
  - library
  - kubernetes
  - helm
icon: https://raw.githubusercontent.com/alexremn/helm-common-chart/main/icon.png
annotations:
  artifacthub.io/category: integration-delivery
  artifacthub.io/license: Apache-2.0
  artifacthub.io/operator: "false"
  artifacthub.io/prerelease: "false"
  artifacthub.io/links: |
    - name: Source
      url: https://github.com/alexremn/helm-common-chart
    - name: Migration v1 → v2
      url: https://github.com/alexremn/helm-common-chart/blob/main/docs/migration-v1-to-v2.md
    - name: Values reference
      url: https://github.com/alexremn/helm-common-chart/blob/main/docs/values-reference.md
  artifacthub.io/changes: |
    - kind: added
      description: "global.secretStore fallback for ExternalSecret secretStoreRef name; per-secret secrets.<name>.secretStore still wins, and the render-time failure message now mentions both knobs"
    - kind: fixed
      description: "chart.statefulset no longer emits persistence-derived entries under pod volumes; persistence renders only as volumeClaimTemplates (plus container volumeMounts), fixing the duplicate-volume-name admission failure"
    - kind: fixed
      description: "common.labels resolves app.kubernetes.io/version via field access instead of dig, fixing 'interface conversion: interface {} is struct' render failures under Helm 3 / werf where .Chart is a struct, not a map"
  artifacthub.io/signKey: |
    fingerprint: keyless
    url: https://github.com/alexremn/helm-common-chart/blob/main/SECURITY.md#verification
