apiVersion: v2
name: common
description: Library Helm chart providing reusable templates for Kubernetes workloads, services, autoscaling, and observability.
type: library
version: "2.4.0"
kubeVersion: ">=1.24-0"
home: https://github.com/alexremn/helm-common-chart
sources:
  - https://github.com/alexremn/helm-common-chart
maintainers:
  - name: Alex Remniov
    url: https://remniov.com
keywords:
  - common
  - library
  - kubernetes
  - helm
icon: https://raw.githubusercontent.com/alexremn/helm-common-chart/main/icon.png
annotations:
  artifacthub.io/category: integration-delivery
  artifacthub.io/license: Apache-2.0
  artifacthub.io/operator: "false"
  artifacthub.io/prerelease: "false"
  artifacthub.io/links: |
    - name: Source
      url: https://github.com/alexremn/helm-common-chart
    - name: Migration v1 → v2
      url: https://github.com/alexremn/helm-common-chart/blob/main/docs/migration-v1-to-v2.md
    - name: Values reference
      url: https://github.com/alexremn/helm-common-chart/blob/main/docs/values-reference.md
  artifacthub.io/changes: |
    - kind: added
      description: "common.extraContainers helper renders long-running sidecars from <component>.sidecars, appended to the pod containers list after the main container"
    - kind: added
      description: "global.externalSecrets.apiVersion makes the ExternalSecret apiVersion configurable (default external-secrets.io/v1, validated) for clusters running ESO < 0.14.0"
    - kind: security
      description: "init containers and sidecars now inherit the active security posture's container securityContext (per-container securityContext overrides win); generic posture also sets pod-level runAsNonRoot"
    - kind: fixed
      description: "extraPodConfig.containers is now rejected at render time — it emitted a duplicate containers key that silently dropped the main application container; use sidecars instead"
    - kind: fixed
      description: "chart.scaledobject fails at render unless minReplicaCount > idleReplicaCount, matching KEDA admission (idle < min)"
    - kind: fixed
      description: "common.dbUrl coerces the port with toString and omits the :port segment when absent, fixing %!s(int=...) / %!s(<nil>) corruption on integer or omitted ports"
  artifacthub.io/signKey: |
    fingerprint: keyless
    url: https://github.com/alexremn/helm-common-chart/blob/main/SECURITY.md#verification
