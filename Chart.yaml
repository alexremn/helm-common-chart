    - kind: added
      description: "Per-component profile override (<cmp>.profile) (X6, X7)"
    - kind: added
      description: "global.emitEnvironmentLabel flag to opt out of helm.sh/environment (X4)"
    - kind: changed
      description: "NetworkPolicy default policyTypes contract documented (F7)"
    - kind: changed
      description: "Drop hardcoded review hook env default (F8)"
    - kind: changed
      description: "Document probes, envFrom, and global.* knobs in values-reference (X8, X9, X10)"
