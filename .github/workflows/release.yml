name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write
  id-token: write   # Cosign keyless OIDC token

jobs:
  tests:
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  package-and-push:
    runs-on: ubuntu-latest
    needs: tests
    env:
      REF_NAME: ${{ github.ref_name }}
      REPO_OWNER: ${{ github.repository_owner }}
      ACTOR: ${{ github.actor }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v4.2.0

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          syft-version: 'v1.18.0'

      - name: Verify tag matches Chart.yaml version
        run: |
          tag="${REF_NAME#v}"
          chart_version="$(helm show chart . | awk '/^version:/ {print $2}' | tr -d '"')"
          if [ "$tag" != "$chart_version" ]; then
            echo "Tag $REF_NAME (=> $tag) does not match Chart.yaml version $chart_version" >&2
            exit 1
          fi

      - name: Compute bare-numeric OCI tag
        id: tag
        run: |
          echo "OCI_TAG=${REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Package chart
        id: package
        run: |
          mkdir -p dist
          helm package . --destination dist
          pkg="$(ls dist/common-*.tgz | head -n1)"
          echo "pkg=$pkg" >> "$GITHUB_OUTPUT"

      - name: Generate SBOMs from packaged artifact (SPDX + CycloneDX)
        env:
          PKG: ${{ steps.package.outputs.pkg }}
        run: |
          syft scan "file:${PKG}" \
            -o spdx-json=dist/common-${REF_NAME}.spdx.json \
            -o cyclonedx-json=dist/common-${REF_NAME}.cdx.json
          ls -la dist/

      - name: Helm registry login (GHCR)
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          printf '%s' "$GHCR_TOKEN" \
            | helm registry login ghcr.io \
                --username "$ACTOR" \
                --password-stdin

      # `helm registry login` writes Helm's own OCI config, which cosign does NOT
      # read. cosign (go-containerregistry) reads ~/.docker/config.json, so log in
      # to the docker credential store too — otherwise `cosign sign/attest/attach`
      # fail with "UNAUTHORIZED: unauthenticated".
      - name: Docker login (GHCR) for Cosign
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          printf '%s' "$GHCR_TOKEN" \
            | docker login ghcr.io \
                --username "$ACTOR" \
                --password-stdin

      - name: Push chart to GHCR (OCI)
        id: push
        env:
          PKG: ${{ steps.package.outputs.pkg }}
        run: |
          set -euo pipefail
          helm push "$PKG" "oci://ghcr.io/${REPO_OWNER}/charts" 2>&1 | tee /tmp/helm-push.log
          digest="$(grep -oE 'sha256:[0-9a-f]{64}' /tmp/helm-push.log | head -n1)"
          if [ -z "$digest" ]; then
            echo "Failed to capture pushed digest from helm push output" >&2; exit 1
          fi
          echo "Pushed digest: ${digest}"
          echo "DIGEST=${digest}" >> "$GITHUB_OUTPUT"

      - name: Sign OCI artifact with Cosign
        env:
          COSIGN_YES: "true"
          DIGEST: ${{ steps.push.outputs.DIGEST }}
        run: |
          echo "Signing ghcr.io/${REPO_OWNER}/charts/common@${DIGEST}"
          cosign sign "ghcr.io/${REPO_OWNER}/charts/common@${DIGEST}"

      - name: Attest SBOM to OCI artifact with Cosign
        env:
          COSIGN_YES: "true"
          DIGEST: ${{ steps.push.outputs.DIGEST }}
        run: |
          ref="ghcr.io/${REPO_OWNER}/charts/common@${DIGEST}"
          echo "Attesting SPDX SBOM to ${ref}"
          cosign attest --type spdxjson \
            --predicate "dist/common-${REF_NAME}.spdx.json" \
            "${ref}"
          cosign attach sbom --sbom "dist/common-${REF_NAME}.spdx.json" \
            "ghcr.io/${REPO_OWNER}/charts/common:${REF_NAME#v}"

      - name: Verify signature (self-check, exact SECURITY.md command)
        env:
          DIGEST: ${{ steps.push.outputs.DIGEST }}
        run: |
          cosign verify \
            --certificate-identity-regexp "^https://github.com/${REPO_OWNER}/helm-common-chart/.github/workflows/release.yml@refs/tags/v" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "ghcr.io/${REPO_OWNER}/charts/common@${DIGEST}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            ${{ steps.package.outputs.pkg }}
            dist/common-${{ github.ref_name }}.spdx.json
            dist/common-${{ github.ref_name }}.cdx.json
          generate_release_notes: true
          body: |
            Helm OCI chart pushed to `ghcr.io/${{ github.repository_owner }}/charts/common:${{ steps.tag.outputs.OCI_TAG }}`.

            **Signed** with Sigstore Cosign (keyless OIDC). Verify:
            ```
            cosign verify \
              --certificate-identity-regexp "^https://github.com/${{ github.repository_owner }}/helm-common-chart/.github/workflows/release.yml@refs/tags/v" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              ghcr.io/${{ github.repository_owner }}/charts/common:${{ steps.tag.outputs.OCI_TAG }}
            ```

            SBOMs attached (SPDX + CycloneDX). See [SECURITY.md#verification](./SECURITY.md#verification).

            Pull with:
            ```
            helm pull oci://ghcr.io/${{ github.repository_owner }}/charts/common --version ${{ steps.tag.outputs.OCI_TAG }}
            ```
