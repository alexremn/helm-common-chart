name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write
  id-token: write   # Cosign keyless OIDC token

jobs:
  package-and-push:
    runs-on: ubuntu-latest
    env:
      REF_NAME: ${{ github.ref_name }}
      REPO_OWNER: ${{ github.repository_owner }}
      ACTOR: ${{ github.actor }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v4.2.0

      - name: Set up crane
        uses: imjasonh/setup-crane@v0.4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v3.0.6'

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0
        with:
          syft-version: 'v1.18.0'

      - name: Verify tag matches Chart.yaml version
        run: |
          tag="${REF_NAME#v}"
          chart_version="$(helm show chart . | awk '/^version:/ {print $2}' | tr -d '"')"
          if [ "$tag" != "$chart_version" ]; then
            echo "Tag $REF_NAME (=> $tag) does not match Chart.yaml version $chart_version" >&2
            exit 1
          fi

      - name: Lint and golden-check before release
        run: |
          make lint
          make golden-check

      - name: Generate SBOMs (SPDX + CycloneDX)
        run: |
          mkdir -p dist
          syft scan dir:. \
            -o spdx-json=dist/common-${REF_NAME}.spdx.json \
            -o cyclonedx-json=dist/common-${REF_NAME}.cdx.json
          ls -la dist/

      - name: Package chart
        id: package
        run: |
          helm package . --destination dist
          pkg="$(ls dist/common-*.tgz | head -n1)"
          echo "pkg=$pkg" >> "$GITHUB_OUTPUT"

      - name: Helm registry login (GHCR)
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          printf '%s' "$GHCR_TOKEN" \
            | helm registry login ghcr.io \
                --username "$ACTOR" \
                --password-stdin

      - name: Crane registry login (GHCR)
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          printf '%s' "$GHCR_TOKEN" \
            | crane auth login ghcr.io \
                --username "$ACTOR" \
                --password-stdin

      - name: Push chart to GHCR (OCI)
        env:
          PKG: ${{ steps.package.outputs.pkg }}
        run: |
          helm push "$PKG" "oci://ghcr.io/${REPO_OWNER}/charts"

      - name: Sign OCI artifact with Cosign
        env:
          COSIGN_YES: "true"
        run: |
          tag="${REF_NAME#v}"
          digest="$(crane digest ghcr.io/${REPO_OWNER}/charts/common:${tag})"
          echo "Signing ghcr.io/${REPO_OWNER}/charts/common@${digest}"
          cosign sign "ghcr.io/${REPO_OWNER}/charts/common@${digest}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.package.outputs.pkg }}
            dist/common-${{ github.ref_name }}.spdx.json
            dist/common-${{ github.ref_name }}.cdx.json
          generate_release_notes: true
          body: |
            Helm OCI chart pushed to `ghcr.io/${{ github.repository_owner }}/charts/common:${{ github.ref_name }}`.

            **Signed** with Sigstore Cosign (keyless OIDC). Verify:
            ```
            cosign verify \
              --certificate-identity-regexp "^https://github.com/${{ github.repository_owner }}/helm-common-chart/" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              ghcr.io/${{ github.repository_owner }}/charts/common:${{ github.ref_name }}
            ```

            SBOMs attached (SPDX + CycloneDX). See [SECURITY.md#verification](./SECURITY.md#verification).

            Pull with:
            ```
            helm pull oci://ghcr.io/${{ github.repository_owner }}/charts/common --version ${{ github.ref_name }}
            ```
