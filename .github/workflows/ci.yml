name: CI

on:
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          # renovate: datasource=github-releases depName=helm/helm
          version: v4.2.2

      - name: Validate Chart.yaml
        run: |
          helm show chart . > /tmp/chart-meta.yaml
          grep -E '^name: common$' /tmp/chart-meta.yaml
          grep -E '^type: library$' /tmp/chart-meta.yaml

      - name: Helm lint (library + every smoke variant)
        run: make lint

      - name: Package hygiene gate (no internal paths in tgz)
        run: |
          helm package . --destination /tmp/ci-pkg
          tgz="$(ls /tmp/ci-pkg/common-*.tgz | head -n1)"
          echo "Inspecting $tgz"
          leaked="$(tar -tzf "$tgz" | grep -E 'common/(docs/|tests/|examples/|\.github/|Makefile|\.kube-linter\.yaml|CLAUDE\.md|AGENTS\.md|RTK\.md|CODEOWNERS|\.claude/|\.rtk/)' || true)"
          if [ -n "$leaked" ]; then
            echo "FAIL: published chart would contain internal paths:" >&2
            echo "$leaked" >&2
            exit 1
          fi
          echo "PASS: package contains no excluded internal paths"

      - name: Golden render check
        run: make golden-check

      - name: Consumer compatibility lint
        run: make lint-consumer

      - name: Render smoke variants (for downstream validate job)
        run: make render-smoke

      - name: Upload smoke renders
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: smoke-renders
          path: /tmp/common-smoke-*.out
          retention-days: 1
          if-no-files-found: error

  validate:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Download smoke renders
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: smoke-renders
          path: /tmp/

      - name: Cache validation tools
        id: cache-validation-tools
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            /usr/local/bin/kubeconform
            /usr/local/bin/kube-linter
          key: validation-tools-kubeconform-v0.7.0-kube-linter-v0.8.3-linux-amd64

      - name: Install kubeconform
        if: steps.cache-validation-tools.outputs.cache-hit != 'true'
        run: |
          # renovate: datasource=github-releases depName=yannh/kubeconform
          curl -fsSL https://github.com/yannh/kubeconform/releases/download/v0.7.0/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: Install kube-linter
        if: steps.cache-validation-tools.outputs.cache-hit != 'true'
        run: |
          # renovate: datasource=github-releases depName=stackrox/kube-linter
          curl -fsSL https://github.com/stackrox/kube-linter/releases/download/v0.8.3/kube-linter-linux.tar.gz | tar xz
          sudo mv kube-linter /usr/local/bin/

      - name: Verify tool versions
        run: |
          kubeconform -v
          kube-linter version

      - name: kubeconform validation
        run: make validate-kubeconform

      - name: kube-linter validation
        run: make validate-kube-linter
