<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="common helm library chart">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5B8DEF"/>
      <stop offset="0.55" stop-color="#2E5BD8"/>
      <stop offset="1" stop-color="#16208A"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.28" cy="0.22" r="0.9">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.30"/>
      <stop offset="0.45" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E4ECFF"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>

  <!-- stacked reusable layers: the library -->
  <g transform="rotate(-20 256 256)">
    <rect x="141" y="146" width="230" height="138" rx="30" fill="#FFFFFF" opacity="0.28"/>
    <rect x="141" y="188" width="230" height="138" rx="30" fill="#FFFFFF" opacity="0.50"/>
    <rect x="141" y="230" width="230" height="138" rx="30" fill="url(#card)"/>
    <!-- template mark on the top layer -->
    <text x="256" y="300" text-anchor="middle" dominant-baseline="central"
          font-family="'SF Mono','DejaVu Sans Mono',Menlo,Consolas,monospace"
          font-size="78" font-weight="700" fill="#2E5BD8">{ }</text>
  </g>
</svg>
