# Exercises a dataFrom-only ExternalSecret (#24): with no secretKey/properties/
# includes, the rendered ExternalSecret must NOT emit a bare `data:` key
# (previously rendered `data: null`).
name: datafrom-app
environment: production

global:
  image:
    repository: ghcr.io/example/app
    tag: "1.0.0"
  secretStore: my-cluster-store

web:
  ports:
    http: 8080

secrets:
  app:
    dataFrom:
      - extract:
          key: secret/data/app
