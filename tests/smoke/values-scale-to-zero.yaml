name: keda-app
environment: dev

global:
  image:
    repository: ghcr.io/example/web
    tag: "1.0.0"

web:
  ports:
    http: 8080
  # Scale-to-zero: KEDA idles to 0 replicas via idleReplicaCount, which MUST be
  # strictly less than minReplicaCount (KEDA admission rejects idle >= min).
  scaling:
    min: 1
    max: 3
    idleReplicaCount: 0
    triggers:
      - type: cron
        timezone: UTC
        start: "0 8 * * *"
        stop: "0 20 * * *"
        desiredReplicas: "3"
