# Asserts that the generic profile now emits secure-by-default pod and
# container securityContext blocks (F5):
#   pod.runAsNonRoot: true, pod.seccompProfile.type: RuntimeDefault
#   container.allowPrivilegeEscalation: false
#   container.readOnlyRootFilesystem: true
#   container.capabilities.drop: [ALL]
# python / go profiles get the same defaults; rails keeps its legacy shape.
name: securitycontext-app
environment: production

global:
  profile: generic
  image:
    repository: ghcr.io/example/api
    tag: "1.0.0"

web:
  ports:
    http: 8080
