# Asserts the `generic` security posture (global.security) emits the hardened
# pod/container securityContext, independent of the runtime profile:
#   container.runAsNonRoot: true
#   container.allowPrivilegeEscalation: false
#   container.readOnlyRootFilesystem: true
#   container.capabilities.drop: [ALL]
#   pod.seccompProfile.type: RuntimeDefault
# Profile stays at the default `generic`; security is the separate axis here.
name: securitycontext-app
environment: production

global:
  security: generic
  image:
    repository: ghcr.io/example/api
    tag: "1.0.0"

web:
  ports:
    http: 8080
