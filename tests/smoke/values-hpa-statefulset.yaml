name: hpa-sts-app
environment: dev

global:
  image:
    repository: ghcr.io/example/web
    tag: "1.0.0"

stateful:
  ports:
    http: 8080
  hpa:
    # StatefulSet components must target their own kind (chart.hpa defaults to Deployment).
    apiVersion: apps/v1
    kind: StatefulSet
    minReplicas: 2
    maxReplicas: 10
    metrics:
      - type: Resource
        resource:
          name: cpu
          target:
            type: Utilization
            averageUtilization: 70
