# Exercises the global.pdb.minAvailable fallback (#26): with no per-component
# pdb bound set, the PDB should render minAvailable from the global default
# instead of silently dropping it. web.pdb is present (so the PDB renders) but
# sets no min/max of its own.
name: global-pdb-app
environment: production

global:
  image:
    repository: ghcr.io/example/app
    tag: "1.0.0"
  pdb:
    minAvailable: 2

web:
  ports:
    http: 8080
  pdb: {}
