name: svc-ap-app
environment: dev

global:
  image:
    repository: ghcr.io/example/web
    tag: "1.0.0"

web:
  ports:
    http:
      port: 8080
      appProtocol: http
  service:
    extraServices:
      grpc:
        ports:
          grpc:
            port: 9000
            appProtocol: grpc

stateful:
  ports:
    http:
      port: 8080
      appProtocol: http
