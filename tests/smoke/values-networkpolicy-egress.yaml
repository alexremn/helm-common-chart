name: np-egress-app
environment: dev

global:
  profile: generic
  image:
    repository: ghcr.io/example/api
    tag: "1.0.0"

web:
  ports:
    http: 8080
  networkPolicy:
    enabled: true
    policyTypes:
      - Ingress
      - Egress
    ingress:
      - from:
          - podSelector:
              matchLabels:
                app.kubernetes.io/name: gateway
        ports:
          - port: 8080
    egress:
      - to:
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: kube-system
          - podSelector:
              matchLabels:
                k8s-app: kube-dns
        ports:
          - protocol: UDP
            port: 53
