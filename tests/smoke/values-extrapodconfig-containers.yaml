# NEGATIVE: extraPodConfig.containers must be REJECTED. It would emit a second
# `containers:` key as a sibling of the pod's own, and YAML last-key-wins would
# silently drop the main application container. Consumers must use `sidecars:`.
name: bad-app
environment: production

global:
  image:
    repository: ghcr.io/example/app
    tag: "1.0.0"

web:
  ports:
    http: 8080
  extraPodConfig:
    containers:
      - name: rogue
        image: busybox
