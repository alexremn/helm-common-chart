name: ds-zero-app
environment: dev

global:
  image:
    repository: ghcr.io/example/log-shipper
    tag: "1.0.0"

logshipper:
  ports:
    metrics: 9090
  # Flat key wins (30) per the hasKey-based precedence introduced in P5-8;
  # the daemonSet sub-map (0) is now the fallback, not the override.
  minReadySeconds: 30
  daemonSet:
    minReadySeconds: 0
