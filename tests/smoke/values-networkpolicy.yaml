name: np-app
environment: dev

global:
  image:
    repository: ghcr.io/example/web
    tag: "1.0.0"

web:
  ports:
    http: 8080
  networkPolicy:
    enabled: true
    policyTypes: [Ingress, Egress]
    ingress:
      - from:
          - namespaceSelector:
              matchLabels:
                name: ingress-nginx
        ports:
          - protocol: TCP
            port: http
    egress:
      - to:
          - podSelector:
              matchLabels:
                app.kubernetes.io/name: postgres
        ports:
          - protocol: TCP
            port: 5432

networkPolicies:
  deny-all:
    podSelector: {}
    policyTypes: [Ingress, Egress]
