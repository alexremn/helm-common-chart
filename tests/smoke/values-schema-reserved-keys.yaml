# Guards the patternProperties removal (schema). Reserved structural keys with
# arbitrary sub-fields used to be wrongly forced through the component schema
# (e.g. global.replicas: "many" -> schema error "got string, want integer").
# They are consumer/operator data the templates ignore and MUST now validate
# clean. This fixture renders a normal web Deployment; the extra keys are inert.
name: reserved-keys-app
environment: production

global:
  image:
    repository: ghcr.io/example/app
    tag: "1.0.0"
  replicas: "many"        # not a real global key; must not hit component.replicas
  strategyType: WeirdType # ditto — previously tripped the component enum

web:
  ports:
    http: 8080
