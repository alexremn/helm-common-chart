# Same component surface as values-features.yaml but with global.profile: generic
# to assert the profile actually changes probe paths, podmonitor relabelings,
# and envFrom phantom defaults. Other Phase 1 task fixtures keep the implicit
# rails profile (which is byte-identical to v1.3.1).
name: features-app
environment: production

global:
  profile: generic
  image:
    registry: ghcr.io
    repository: example/features-app
    tag: "3.1.4"
  imagePullPolicy: Always
  imagePullSecrets:
    - name: ghcr-pull
  ingress:
    className: nginx
  hooks:
    enabled: true
    weight: "-7"
  envFrom:
    configs: []
    secrets: []

web:
  ports:
    http: 8080
    metrics: 9090
  securityContext:
    pod:
      runAsUser: 2000
      runAsGroup: 2000
      seccompType: RuntimeDefault
    container:
      allowPrivilegeEscalation: false
      runAsNonRoot: true
      readOnlyRootFilesystem: true
  volumes:
    - name: app-config
      type: config
      configMapName: features-config
  tolerations:
    - key: "CriticalAppsOnly"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"
    - key: "ops.hubstaff.com/drain-safe"
      operator: "Exists"
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: "workload_type"
                operator: In
                values: ["critical"]
              - key: "karpenter.sh/capacity-type"
                operator: In
                values: ["on-demand"]
  podMonitor:
    enabled: true
  ingress:
    - name: public
      domains:
        - app.example.com

stateful:
  ports:
    http: 8081
  persistence:
    name: data
    size: 10Gi

jobs:
  run_task:
    command: ["/bin/sh", "-c"]
    args: ["echo features"]

cronjobs:
  sync_task:
    schedule: "0 0 * * *"
    command: ["/bin/sh", "-c"]
    args: ["echo cron features"]
