name: smoke
environment: dev

global:
  image:
    repository: ghcr.io/example/automount-pod-default
    tag: "1.0.0"

web:
  replicas: 1
  ports:
    http: 8080
  # intentionally no serviceAccount block — expect default SA and, since
  # serviceAccount.automount is unset, a pod-level
  # automountServiceAccountToken: false (secure-by-default).
