# P3-2: asserts the DEFAULT `minimal` posture now ships a baseline-hardened
# container securityContext (allowPrivilegeEscalation: false +
# capabilities.drop: [ALL]) while runAsNonRoot / readOnlyRootFilesystem stay
# opt-in. `override` proves the baseline remains overridable per-component.
name: security-minimal
environment: production

global:
  security: minimal        # default posture, stated explicitly for clarity
  image:
    repository: ghcr.io/example/api
    tag: "1.0.0"

# Pure baseline: no securityContext override -> baseline hardening applies.
web:
  ports:
    http: 8080

# Opt-out path: re-enable privilege escalation + restore default caps,
# proving component override wins over the baseline.
override:
  ports:
    http: 8081
  securityContext:
    container:
      allowPrivilegeEscalation: true
      capabilities:
        add:
          - NET_BIND_SERVICE
