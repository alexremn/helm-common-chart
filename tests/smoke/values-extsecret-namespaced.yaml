name: extsecret-namespaced-app
environment: dev

global:
  image:
    repository: ghcr.io/example/api
    tag: "1.0.0"

secrets:
  app-secrets:
    secretStore: my-namespaced-store
    secretStoreKind: SecretStore
    secretKey: /apps/internal/api
    properties:
      - DB_PASSWORD
      - API_KEY
